name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: false

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          release-type: simple
          target-branch: master

      - name: Build release archives
        if: steps.release.outputs.release_created == 'true'
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag_name }}"
          staging="dist/rees46-skills-${tag}"

          mkdir -p "$staging"

          cp README.md "$staging/"
          if [ -f README.ru.md ]; then
            cp README.ru.md "$staging/"
          fi

          while IFS= read -r skill_file; do
            skill_dir="$(dirname "$skill_file")"
            mkdir -p "$staging/$skill_dir"
            cp -R "$skill_dir/." "$staging/$skill_dir/"
          done < <(find . -mindepth 2 -maxdepth 2 -name SKILL.md -not -path './docs/*' | sort)

          tar -czf "dist/rees46-skills-${tag}.tar.gz" -C dist "rees46-skills-${tag}"
          (cd dist && zip -qr "rees46-skills-${tag}.zip" "rees46-skills-${tag}")

      - name: Upload release archives
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag_name }}"

          gh release upload "$tag" \
            "dist/rees46-skills-${tag}.tar.gz" \
            "dist/rees46-skills-${tag}.zip" \
            --clobber
